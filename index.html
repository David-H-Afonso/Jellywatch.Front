<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Jellywatch</title>
		<meta name="description" content="Jellywatch – track your Jellyfin watch activity" />
		<!-- Apply theme BEFORE any rendering to prevent FOUC -->
		<script>
			;(function () {
				var theme = localStorage.getItem('theme') || 'dark'
				document.documentElement.setAttribute('data-theme', theme)
				document.documentElement.classList.add('preload')
			})()
		</script>
		<!-- Load runtime environment configuration (for Docker) -->
		<script defer src="/env-config.js"></script>
		<!-- Inter font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			as="style"
			onload="
				this.onload = null
				this.rel = 'stylesheet'
			" />
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
				rel="stylesheet" />
		</noscript>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
		<script>
			// Remove preload class after first paint to enable transitions
			requestAnimationFrame(function () {
				document.documentElement.classList.remove('preload')
			})
		</script>
	</body>
</html>
